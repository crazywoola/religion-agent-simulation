<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Multi-Religion Agent Simulator</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="layout">
      <aside class="panel left">
        <h1 id="appTitle">Religion Agent Simulation</h1>
        <p class="hint" id="appHint">
          Each religion starts with 10,000 followers. The system simulates only assimilation/loss
          across religions, while the total population remains constant.
        </p>

        <div class="controls">
          <button id="startBtn">Start Simulation</button>
          <button id="stopBtn" disabled>Pause</button>
          <label>
            <span id="languageLabel">Language</span>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="zh-CN">简体中文</option>
              <option value="ja">日本語</option>
            </select>
          </label>
          <label>
            <span id="tickLabel">Tick Interval (ms)</span>
            <input id="tickInput" type="number" value="2000" min="800" max="10000" step="200" />
          </label>
          <label class="switch">
            <input id="openaiToggle" type="checkbox" checked />
            <span id="openaiLabel">Use OpenAI API for doctrine/action generation</span>
          </label>
        </div>

        <div class="status" id="status">Status: Not started</div>

        <h2 id="religionSectionTitle">Religion Profiles</h2>
        <div id="religionCards" class="religion-cards"></div>
      </aside>

      <main class="stage-wrap">
        <canvas id="sceneCanvas"></canvas>
      </main>

      <aside class="panel right">
        <h2 id="regionSectionTitle">Regional Landscape</h2>
        <div id="regionBoard" class="region-board"></div>

        <h2 id="transferSectionTitle">Key Assimilation Links</h2>
        <div id="transferBoard" class="transfer-board"></div>

        <h2 id="logSectionTitle">Mission Logs</h2>
        <div id="logList" class="log-list"></div>
      </aside>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
